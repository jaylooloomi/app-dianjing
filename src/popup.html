<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>點睛 Dianjing</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #1e293b; color: #e2e8f0; font-size: 14px; user-select: none; }
    .bar { -webkit-app-region: drag; display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #334155; }
    .bar .title { font-weight: 600; }
    .bar .spacer { flex: 1; }
    .bar .x { -webkit-app-region: no-drag; cursor: pointer; color: #94a3b8; border: none; background: none; font-size: 16px; }
    .wrap { padding: 12px 14px; }
    .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; margin: 4px 0; }
    .orig { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 10px; color: #cbd5e1;
      max-height: 64px; overflow: auto; white-space: pre-wrap; user-select: text; }
    .scenes { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 10px; }
    .scene { -webkit-app-region: no-drag; cursor: pointer; border: 1px solid #334155; background: #0f172a; color: #cbd5e1;
      padding: 5px 10px; border-radius: 999px; font-size: 13px; }
    .scene.active { border-color: #38bdf8; background: #0c4a6e; color: #e0f2fe; }
    textarea { width: 100%; min-height: 150px; resize: vertical; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #f1f5f9; padding: 10px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; user-select: text; }
    .status { font-size: 12px; color: #94a3b8; min-height: 16px; margin: 6px 2px; }
    .status .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn { -webkit-app-region: no-drag; cursor: pointer; flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 14px; }
    .btn.primary { background: #2563eb; color: #fff; }
    .btn.primary:disabled { opacity: .5; cursor: default; }
    .btn.ghost { background: #334155; color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="bar"><span class="title">🪶 點睛</span><span class="spacer"></span><button class="x" id="closeX">✕</button></div>
  <div class="wrap">
    <div class="label">原文</div>
    <div class="orig" id="orig"></div>
    <div class="label" style="margin-top:10px">場景</div>
    <div class="scenes" id="scenes"></div>
    <div class="label">潤飾結果(可編輯)</div>
    <textarea id="result" placeholder=""></textarea>
    <div class="status" id="status"></div>
    <div class="actions">
      <button class="btn primary" id="replaceBtn">取代原文</button>
      <button class="btn ghost" id="copyBtn">複製</button>
      <button class="btn ghost" id="closeBtn">關閉</button>
    </div>
  </div>
  <script src="./popup.js"></script>
</body>
</html>
